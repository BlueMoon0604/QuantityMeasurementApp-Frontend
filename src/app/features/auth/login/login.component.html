<div class="auth-page">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-grid"></div>

  <div class="auth-shell">
    <section class="auth-left">
      <h1>Welcome Back</h1>
      <p class="subtitle">
        Login to continue your quantity measurement journey.
      </p>

      <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="Enter your email"
          />
          <small *ngIf="email?.touched && email?.invalid">
            Please enter a valid email address.
          </small>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="Enter your password"
          />
          <small *ngIf="password?.touched && password?.invalid">
            Password is required.
          </small>
        </div>

        <button type="submit" class="primary-btn">Login</button>
      </form>

      <button type="button" class="google-btn" (click)="continueWithGoogle()">
        Continue with Google
      </button>

      <p class="switch-text">
        Don’t have an account?
        <a [routerLink]="['/signup']" [queryParams]="{ redirectTo: redirectTo }">
          Signup
        </a>
      </p>
    </section>

    <aside class="auth-right">
      <div class="feature-card">
        <h2>Track Your Measurement Journey</h2>
        <p>
          Keep your conversions safe, revisit them anytime, and unlock a smoother workflow.
        </p>
      </div>
    </aside>
  </div>
</div>
